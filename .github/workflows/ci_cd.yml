name: Credit Card MLOps – CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ============================================================
  # LINT & UNIT TESTS
  # ============================================================
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov httpx
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 api/main.py evidently/main.py scripts/ --max-line-length=120 --ignore=E501,W503

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=api --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  # ============================================================
  # BUILD DOCKER IMAGES
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t credit-card-api:${{ github.sha }} ./api

      - name: Build Evidently image
        run: docker build -t credit-card-evidently:${{ github.sha }} ./evidently

      - name: Build MLflow image
        run: docker build -t credit-card-mlflow:${{ github.sha }} ./mlflow

  # ============================================================
  # INTEGRATION TEST (docker-compose smoke test)
  # ============================================================
  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start infrastructure
        run: |
          docker-compose up -d postgres minio minio-init mlflow
          sleep 30

      - name: Check MLflow health
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:5000/health

      - name: Train & register model (smoke)
        run: |
          pip install -r scripts/requirements.txt
          python scripts/train_and_register.py
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: minio123
          DATA_DIR: data/raw/Dataset
        continue-on-error: true

      - name: Start API & Evidently
        run: |
          docker-compose up -d api evidently
          sleep 20

      - name: Check API health
        run: curl --retry 5 --retry-delay 5 http://localhost:8000/health

      - name: Tear down
        if: always()
        run: docker-compose down -v
