apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-datasource
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    version: 1
    jsonData:
      timeInterval: 10s
      queryTimeout: 60s
      httpMethod: POST
      incrementalQuerying: true
      prometheusType: Prometheus
      prometheusVersion: 2.40.0
      cacheLevel: Low
      defaultEditor: code
