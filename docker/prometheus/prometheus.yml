global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: credit-card-mlops
    env: production

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  - job_name: credit-card-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: credit-card-api

  - job_name: evidently
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ["evidently:8001"]
        labels:
          service: evidently
